name: GUIManager
version: 70.0
main: com.gmail.bobason01.GUIManager
api-version: 1.13
author: crston
description: Extreme performance oriented GUI Management Plugin
softdepend: [Vault, PlaceholderAPI]

commands:
  gui:
    description: Main command for GUI Manager
    usage: /gui <subcommand>
    permission: guimanager.use

permissions:
  guimanager.use:
    description: Basic permission to use gui command
    default: op
  guimanager.admin:
    description: Full access to all gui features
    default: op
    children:
      guimanager.open: true
      guimanager.open.others: true
      guimanager.create: true
      guimanager.edit: true
      guimanager.copy: true
      guimanager.delete: true
      guimanager.list: true
      guimanager.reload: true
      guimanager.import: true
  guimanager.open:
    description: Allow opening guis
    default: op
  guimanager.open.others:
    description: Allow opening guis for other players
    default: op
  guimanager.create:
    description: Allow creating new guis
    default: op
  guimanager.edit:
    description: Allow editing existing guis
    default: op
  guimanager.copy:
    description: Allow copying guis
    default: op
  guimanager.delete:
    description: Allow deleting guis
    default: op
  guimanager.list:
    description: Allow listing all guis
    default: op
  guimanager.reload:
    description: Allow reloading the plugin
    default: op
  guimanager.import:
    description: Allow importing from other plugins
    default: op